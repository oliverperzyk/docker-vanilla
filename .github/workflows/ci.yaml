# CI workflow that lints Docker-related stuff.
---
name: Validate Dockerfile and Docker Compose.
on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
permissions:
    contents: read
jobs:
    validate-code:
        name: Validate codebase.
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository.
              uses: actions/checkout@v7
            - name: Lint Dockerfile using Hadolint.
              uses: hadolint/hadolint-action@v3.3.0
              with:
                  context: .
                  dockerfile: Dockerfile
            - name: Lint Docker Compose.
              run: docker compose -f docker-compose.yaml config
            - name: Set up Bun.
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
            - name: Install dependencies.
              run: bun install --frozen-lockfile
            - name: Check formatting of all files using Prettier.
              run: bunx prettier --check .
